<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>T Owen Portfolio</title>
</head>
<body>
    <!-- Welcome Section -->
<section>
  <div id="Main Page" class="flex items-center justify-center h-screen bg-black">
      <a href="#"
         onclick="goToHome()"
         class="text-5xl font-bold text-white hover:underline transition duration-300 animate-fadeUp"
         style="font-family: 'Roboto', sans-serif;">
         Welcome
      </a>
  </div>
</section>

<style>
@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(40px);
  }
  to {
    opacity: 1; 
    transform: translateY(0);
  }
}

.animate-fadeUp {
  animation: fadeUp 1.5s ease forwards;
}

/* Fade-out animation for click */
@keyframes fadeOut {
  from { opacity: 1; }
  to { opacity: 0; }
}

.fade-out {
  animation: fadeOut 1s forwards;
}
</style>

<script>
function goToHome() {
  const screen = document.getElementById('Main Page');
  screen.classList.add('fade-out');

  setTimeout(() => {
    window.location.href = 'Main page.html';
  }, 1000); // wait for fade-out
}
</script>
</body>
</html>
